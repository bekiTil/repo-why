<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B5BFF"/>
      <stop offset="100%" stop-color="#3D2C8D"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB020"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Connection lines (graph edges) -->
  <g stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.75">
    <line x1="64" y1="64" x2="30" y2="32"/>
    <line x1="64" y1="64" x2="98" y2="32"/>
    <line x1="64" y1="64" x2="30" y2="96"/>
    <line x1="64" y1="64" x2="98" y2="96"/>
    <line x1="30" y1="32" x2="98" y2="32"/>
    <line x1="30" y1="96" x2="98" y2="96"/>
  </g>

  <!-- Outer nodes -->
  <g fill="#FFFFFF" filter="url(#softShadow)">
    <circle cx="30" cy="32" r="7.5"/>
    <circle cx="98" cy="32" r="7.5"/>
    <circle cx="30" cy="96" r="7.5"/>
    <circle cx="98" cy="96" r="7.5"/>
  </g>

  <!-- Center highlighted node (the "answer" / focus) -->
  <circle cx="64" cy="64" r="16" fill="url(#centerGlow)" filter="url(#softShadow)"/>
  <circle cx="64" cy="64" r="6" fill="#3D2C8D" opacity="0.85"/>
</svg>
